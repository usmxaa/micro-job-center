<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha Task - Inbox Dollar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; --card-bg: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; padding: 20px; text-align: center; }
        .app-shell { max-width: 420px; margin: auto; }
        .captcha-box { background: var(--card-bg); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); margin-top: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .captcha-code { font-size: 32px; font-weight: 800; letter-spacing: 8px; color: var(--primary); background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px; user-select: none; border: 1px dashed #444; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; text-align: center; font-size: 18px; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        .btn { background: var(--primary); border: none; padding: 15px; width: 100%; border-radius: 15px; color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .timer { font-size: 24px; color: var(--primary); font-weight: 800; margin-top: 10px; display: none; }
        .status-text { font-size: 14px; color: #aaa; margin-top: 10px; min-height: 20px; }
        .back-link { margin-top: 20px; color: #888; cursor: pointer; display: inline-block; text-decoration: none; font-size: 14px; }
        #cooldown-msg { color: #FF4444; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="app-shell">
        <h3 style="margin-top: 30px;">Solve Captcha</h3>
        
        <div class="captcha-box">
            <div class="captcha-code" id="mainCaptcha">LOADING</div>
            <input type="text" id="userInput" placeholder="উপরের কোডটি লিখুন">
            
            <div id="status" class="status-text">ক্যাপচা পূরণ করে ৫ কয়েন জিতুন</div>
            <div id="timer" class="timer">10s</div>
            
            <button class="btn" id="submitBtn" onclick="validateCaptcha()">SUBMIT & EARN</button>
            <div id="cooldown-msg">পরবর্তী ক্যাপচার জন্য অপেক্ষা করুন...</div>
        </div>

        <p class="back-link" onclick="location.href='dashboard.html'">← Back to Home</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", 
            authDomain: "micro-job-center.firebaseapp.com", 
            databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", 
            projectId: "micro-job-center", 
            storageBucket: "micro-job-center.firebasestorage.app", 
            messagingSenderId: "146985711984", 
            appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const smartLink = "https://www.profitablecpmratenetwork.com/uu5c1ia75?key=74b276b8394ac571c3400dbe1c55b86e";

        // নতুন ক্যাপচা জেনারেট করা
        function generateCaptcha() {
            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let code = "";
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('mainCaptcha').innerText = code;
        }

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                generateCaptcha();
            }
        });

        function validateCaptcha() {
            const user = auth.currentUser;
            const code = document.getElementById('mainCaptcha').innerText;
            const input = document.getElementById('userInput').value.toUpperCase().trim();
            const btn = document.getElementById('submitBtn');
            const statusText = document.getElementById('status');
            const timerDisplay = document.getElementById('timer');
            const userInputField = document.getElementById('userInput');

            if (!user) return;
            if (input === "") return alert("দয়া করে ক্যাপচা কোডটি লিখুন!");

            if (input === code) {
                // ১. অ্যাড ওপেন করা
                window.open(smartLink, '_blank');

                btn.disabled = true;
                userInputField.disabled = true;
                btn.innerText = "CHECKING...";
                statusText.innerText = "অ্যাডটি দেখুন, রিওয়ার্ড প্রসেস হচ্ছে...";
                timerDisplay.style.display = "block";

                // ২. ১০ সেকেন্ড টাইমার শুরু
                let timeLeft = 10;
                timerDisplay.innerText = timeLeft + "s";

                const countdown = setInterval(() => {
                    timeLeft--;
                    timerDisplay.innerText = timeLeft + "s";
                    
                    if(timeLeft <= 0) {
                        clearInterval(countdown);
                        timerDisplay.innerText = "DONE!";
                        addReward(user.uid);
                    }
                }, 1000);

            } else {
                alert("ভুল ক্যাপচা! আবার চেষ্টা করুন।");
                generateCaptcha();
                document.getElementById('userInput').value = "";
            }
        }

        function addReward(uid) {
            db.ref('users/' + uid + '/balance').transaction(c => (c || 0) + 5)
            .then(() => {
                document.getElementById('status').innerText = "অভিনন্দন! ৫ কয়েন যোগ হয়েছে। 🎉";
                startCooldown();
            }).catch(err => {
                alert("Error: " + err.message);
                resetCaptcha();
            });
        }

        function startCooldown() {
            let waitTime = 5;
            const btn = document.getElementById('submitBtn');
            const cooldownMsg = document.getElementById('cooldown-msg');
            const timerDisplay = document.getElementById('timer');

            btn.style.display = "none";
            cooldownMsg.style.display = "block";

            const waitInterval = setInterval(() => {
                waitTime--;
                timerDisplay.innerText = waitTime + "s";
                
                if(waitTime <= 0) {
                    clearInterval(waitInterval);
                    resetCaptcha();
                }
            }, 1000);
        }

        function resetCaptcha() {
            const btn = document.getElementById('submitBtn');
            const userInputField = document.getElementById('userInput');
            const cooldownMsg = document.getElementById('cooldown-msg');
            const timerDisplay = document.getElementById('timer');
            const statusText = document.getElementById('status');

            btn.style.display = "block";
            btn.disabled = false;
            userInputField.disabled = false;
            userInputField.value = "";
            btn.innerText = "SUBMIT & EARN";
            cooldownMsg.style.display = "none";
            timerDisplay.style.display = "none";
            statusText.innerText = "ক্যাপচা পূরণ করে ৫ কয়েন জিতুন";
            generateCaptcha();
        }
    </script>
</body>
</html>
