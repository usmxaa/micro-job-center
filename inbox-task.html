<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox Tasks - Inbox Dollar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; --card: rgba(255,255,255,0.05); }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 420px; margin: auto; }
        .task-box { 
            background: var(--card); border-radius: 20px; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .task-info { display: flex; align-items: center; gap: 12px; }
        /* ছবি দেখানোর স্টাইল */
        .task-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: #1a1a1a; }
        .task-title { font-weight: 600; font-size: 14px; margin: 0; }
        .task-reward { color: var(--primary); font-size: 12px; font-weight: 700; }
        .btn { background: var(--primary); border: none; padding: 8px 15px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h3 style="text-align:center; color:var(--primary);">Inbox Tasks</h3>
        <div id="taskContainer"><p style="text-align:center; color:#888;">Loading offers...</p></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", 
            authDomain: "micro-job-center.firebaseapp.com", 
            databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", 
            projectId: "micro-job-center", 
            storageBucket: "micro-job-center.firebasestorage.app", 
            messagingSenderId: "146985711984", 
            appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // অফার লোড করা (ইমেজ সহ)
        db.ref('cpaOffers').on('value', (snapshot) => {
            const container = document.getElementById('taskContainer');
            container.innerHTML = ""; 
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const data = child.val();
                    // যদি icon ফিল্ডে লিঙ্ক থাকে তবে ছবি দেখাবে, না থাকলে ডিফল্ট ইমোজি
                    const displayMedia = data.icon.startsWith('http') 
                        ? `<img src="${data.icon}" class="task-img">` 
                        : `<div class="task-img" style="display:flex; align-items:center; justify-content:center; font-size:24px;">${data.icon || '🎁'}</div>`;

                    container.innerHTML += `
                        <div class="task-box">
                            <div class="task-info">
                                ${displayMedia}
                                <div class="task-details">
                                    <p class="task-title">${data.title}</p>
                                    <span class="task-reward">+${data.reward} Coins</span>
                                </div>
                            </div>
                            <button class="btn" onclick="claimOffer('${child.key}', '${data.link}', ${data.reward})">CLAIM</button>
                        </div>`;
                });
            } else {
                container.innerHTML = "<p style='text-align:center; color:#666;'>No offers active.</p>";
            }
        });

        function claimOffer(id, link, reward) {
            const user = auth.currentUser;
            if(!user) return alert("Please Login First!");
            window.open(link, '_blank');
            db.ref('users/' + user.uid + '/balance').transaction(c => (c || 0) + parseInt(reward))
            .then(() => alert(reward + " Coins added!"));
        }
    </script>
</body>
</html>
