<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tasks - Inbox Dollar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; --card: rgba(255,255,255,0.05); }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        #taskContainer { min-height: 200px; }
        .task-box { 
            background: var(--card); border-radius: 20px; padding: 18px; 
            border: 1px solid rgba(255,255,255,0.1); display: flex; 
            justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .task-info { display: flex; align-items: center; gap: 12px; }
        .task-icon { font-size: 22px; background: rgba(255,123,0,0.1); padding: 8px; border-radius: 10px; }
        .task-title { font-weight: 600; font-size: 14px; margin: 0; }
        .task-reward { color: var(--primary); font-size: 12px; font-weight: 700; }
        .btn { background: var(--primary); border: none; padding: 10px 18px; border-radius: 10px; color: #000; font-weight: 700; cursor: pointer; }
        .loading { text-align: center; color: #888; margin-top: 50px; }
        /* ব্যাক বাটন স্টাইল */
        .back-btn { text-align: center; display: block; margin-top: 30px; color: #888; text-decoration: none; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h3>Premium Offers</h3>
        <p style="font-size: 12px; color: #888;">নতুন সব অফার এখান থেকে পূরণ করুন</p>
    </div>

    <div id="taskContainer">
        <div class="loading">অফার লোড হচ্ছে...</div>
    </div>

    <a href="dashboard.html" class="back-btn">← Back to Home</a>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", 
            authDomain: "micro-job-center.firebaseapp.com", 
            databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", 
            projectId: "micro-job-center", 
            storageBucket: "micro-job-center.firebasestorage.app", 
            messagingSenderId: "146985711984", 
            appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // পরিবর্তন ২: লগইন চেক (ইউজার না থাকলে index.html এ যাবে)
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "index.html";
            }
        });

        // অ্যাডমিন প্যানেল থেকে অফারগুলো নিয়ে আসা
        db.ref('cpaOffers').on('value', (snapshot) => {
            const container = document.getElementById('taskContainer');
            container.innerHTML = ""; 
            
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const data = child.val();
                    container.innerHTML += `
                        <div class="task-box">
                            <div class="task-info">
                                <div class="task-icon">${data.icon || '🎁'}</div>
                                <div>
                                    <p class="task-title">${data.title}</p>
                                    <span class="task-reward">+${data.reward} Coins</span>
                                </div>
                            </div>
                            <button class="btn" onclick="openOffer('${data.link}', ${data.reward})">CLAIM</button>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<p style='text-align:center; color:#666;'>এখনো কোনো অফার নেই।</p>";
            }
        });

        function openOffer(link, reward) {
            const user = auth.currentUser;
            if(!user) {
                window.location.href = "index.html";
                return;
            }

            window.open(link, '_blank');

            // পরিবর্তন ৩: ইউজার অবজেক্টের পাথ ঠিক করা হলো (user.uid)
            db.ref('users/' + user.uid + '/balance').transaction(c => (c || 0) + parseInt(reward))
            .then(() => alert("অফারটি ওপেন হয়েছে! রিওয়ার্ড যোগ করা হয়েছে।"));
        }
    </script>
</body>
</html>
