<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz - Inbox Dollar</title>
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; --card: rgba(255,255,255,0.05); }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; text-align: center; padding: 20px; }
        .quiz-box { background: var(--card); border-radius: 25px; padding: 40px 20px; border: 1px solid rgba(255,255,255,0.1); max-width: 350px; margin: 40px auto; }
        .question { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 25px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #333; background: #000; color: white; text-align: center; font-size: 20px; outline: none; margin-bottom: 20px; }
        .btn { background: var(--primary); border: none; padding: 15px; width: 100%; border-radius: 15px; color: #000; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="quiz-box">
        <p style="color: #888;">Solve to Earn 20 Coins</p>
        <div class="question" id="ques">5 + 12</div>
        <input type="number" id="ans" placeholder="Your Answer">
        <button class="btn" onclick="checkMath()">SUBMIT ANSWER</button>
    </div>
    <p onclick="location.href='index.html'" style="color: #555; cursor:pointer;">← Back Home</p>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", authDomain: "micro-job-center.firebaseapp.com", databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", projectId: "micro-job-center", storageBucket: "micro-job-center.firebasestorage.app", messagingSenderId: "146985711984", appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let num1 = Math.floor(Math.random() * 20);
        let num2 = Math.floor(Math.random() * 20);
        let correctAnswer = num1 + num2;
        document.getElementById('ques').innerText = `${num1} + ${num2}`;

        function checkMath() {
            const user = auth.currentUser;
            const userAns = document.getElementById('ans').value;
            if(!user) return alert("Login first!");

            if(parseInt(userAns) === correctAnswer) {
                db.ref('users/' + user.uid + '/balance').transaction(c => (c || 0) + 20).then(() => {
                    alert("Correct! 20 Coins Added.");
                    location.reload();
                });
            } else { alert("Wrong answer! Try again."); }
        }
    </script>
</body>
</html>
