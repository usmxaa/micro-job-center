<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle - Inbox Dollar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; text-align: center; padding: 20px; margin: 0; }
        .puzzle-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; margin: 40px auto; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hint { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--primary); }
        input { width: 100%; padding: 15px; border-radius: 12px; background: #000; color: white; border: 1px solid #333; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        .btn { background: var(--primary); border: none; padding: 15px; width: 100%; border-radius: 15px; color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .status-text { font-size: 14px; color: #aaa; margin-top: 10px; min-height: 20px; }
        .back-link { margin-top: 20px; color: #555; cursor: pointer; display: inline-block; text-decoration: none; font-size: 14px; }
        #cooldown-msg { color: #FF4444; font-size: 14px; margin-top: 10px; display: none; }

        /* In-page Ad Overlay */
        #adOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }
        #adFrame { width: 100%; height: 100%; border: none; }
        #adTimer {
            position: absolute; top: 20px; right: 20px; background: var(--primary);
            color: #000; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 18px;
            z-index: 10000; box-shadow: 0 0 15px rgba(255,123,0,0.5);
        }
    </style>
</head>
<body>

    <div id="adOverlay">
        <div id="adTimer">10s</div>
        <iframe id="adFrame" src=""></iframe>
    </div>

    <div class="puzzle-box">
        <div class="hint" id="question">What has hands but cannot clap?</div>
        <input type="text" id="puzzAns" placeholder="আপনার উত্তর লিখুন">
        
        <div id="status" class="status-text">সঠিক উত্তর দিয়ে ৪০ কয়েন জিতুন</div>
        
        <button class="btn" id="submitBtn" onclick="solvePuzzle()">SUBMIT</button>
        <div id="cooldown-msg">পরবর্তী পাজলের জন্য অপেক্ষা করুন...</div>
    </div>

    <a class="back-link" onclick="location.href='dashboard.html'">← Back Home</a>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", 
            authDomain: "micro-job-center.firebaseapp.com", 
            databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", 
            projectId: "micro-job-center", 
            storageBucket: "micro-job-center.firebasestorage.app", 
            messagingSenderId: "146985711984", 
            appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const smartLink = "https://www.profitablecpmratenetwork.com/uu5c1ia75?key=74b276b8394ac571c3400dbe1c55b86e";

        auth.onAuthStateChanged((user) => {
            if (!user) window.location.href = "index.html";
        });

        function solvePuzzle() {
            const ansInput = document.getElementById('puzzAns');
            const ans = ansInput.value.toLowerCase().trim();
            const user = auth.currentUser;
            const btn = document.getElementById('submitBtn');

            if(!user) return;

            // সঠিক উত্তর চেক (clock)
            if(ans === "clock") {
                const overlay = document.getElementById('adOverlay');
                const frame = document.getElementById('adFrame');
                const timerEl = document.getElementById('adTimer');

                // ১. অ্যাড লোড ও ওভারলে প্রদর্শন
                frame.src = smartLink;
                overlay.style.display = "block";

                let timeLeft = 10;
                timerEl.innerText = timeLeft + "s";

                const countdown = setInterval(() => {
                    timeLeft--;
                    timerEl.innerText = timeLeft + "s";
                    
                    if(timeLeft <= 0) {
                        clearInterval(countdown);
                        addReward(user.uid);
                    }
                }, 1000);

            } else { 
                alert("ভুল উত্তর! আবার চেষ্টা করুন। (Hint: ঘড়ি)"); 
            }
        }

        function addReward(uid) {
            db.ref('users/' + uid + '/balance').transaction(c => (c || 0) + 40)
            .then(() => {
                // অ্যাড বন্ধ করা
                document.getElementById('adOverlay').style.display = "none";
                document.getElementById('adFrame').src = "";
                document.getElementById('status').innerText = "অভিনন্দন! ৪০ কয়েন যোগ হয়েছে। 🎉";
                startCooldown();
            });
        }

        function startCooldown() {
            let waitTime = 5;
            const btn = document.getElementById('submitBtn');
            const cooldownMsg = document.getElementById('cooldown-msg');
            const ansInput = document.getElementById('puzzAns');

            btn.disabled = true;
            ansInput.disabled = true;
            cooldownMsg.style.display = "block";

            const waitInterval = setInterval(() => {
                waitTime--;
                cooldownMsg.innerText = `পরবর্তী পাজলের জন্য অপেক্ষা করুন: ${waitTime}s`;
                
                if(waitTime <= 0) {
                    clearInterval(waitInterval);
                    resetPuzzle();
                }
            }, 1000);
        }

        function resetPuzzle() {
            const btn = document.getElementById('submitBtn');
            const ansInput = document.getElementById('puzzAns');
            const cooldownMsg = document.getElementById('cooldown-msg');
            const statusText = document.getElementById('status');

            btn.disabled = false;
            ansInput.disabled = false;
            ansInput.value = "";
            cooldownMsg.style.display = "none";
            statusText.innerText = "সঠিক উত্তর দিয়ে ৪০ কয়েন জিতুন";
        }
    </script>
</body>
</html>
