<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Puzzle - Inbox Dollar</title>
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; text-align: center; padding: 20px; }
        .puzzle-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; margin: 40px auto; max-width: 350px; }
        .hint { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--primary); }
        input { width: 100%; padding: 15px; border-radius: 12px; background: #000; color: white; border: 1px solid #333; text-align: center; margin-bottom: 20px; }
        .btn { background: var(--primary); border: none; padding: 15px; width: 100%; border-radius: 15px; color: #000; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="puzzle-box">
        <div class="hint">What has hands but cannot clap?</div>
        <input type="text" id="puzzAns" placeholder="Answer here">
        <button class="btn" onclick="solvePuzzle()">SUBMIT</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", authDomain: "micro-job-center.firebaseapp.com", databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", projectId: "micro-job-center", storageBucket: "micro-job-center.firebasestorage.app", messagingSenderId: "146985711984", appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function solvePuzzle() {
            const ans = document.getElementById('puzzAns').value.toLowerCase();
            const user = auth.currentUser;
            if(ans === "clock") {
                db.ref('users/' + user.uid + '/balance').transaction(c => (c || 0) + 40).then(() => {
                    alert("Awesome! 40 Coins Added.");
                    location.href='index.html';
                });
            } else { alert("Try again!"); }
        }
    </script>
</body>
</html>
