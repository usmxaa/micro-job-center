<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Inbox Dollar</title>
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; padding: 20px; }
        .rank-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .rank-no { background: var(--primary); color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .name { flex: 1; margin-left: 15px; font-weight: 600; }
        .coins { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>
    <h3 style="text-align: center;">Top 10 Earners 🏆</h3>
    <div id="rankList">Loading Ranking...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", authDomain: "micro-job-center.firebaseapp.com", databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", projectId: "micro-job-center", storageBucket: "micro-job-center.firebasestorage.app", messagingSenderId: "146985711984", appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('users').orderByChild('balance').limitToLast(10).on('value', (snapshot) => {
            let listHtml = "";
            let rank = 1;
            let users = [];
            snapshot.forEach(child => { users.push(child.val()); });
            users.reverse().forEach(u => {
                listHtml += `<div class="rank-item">
                    <div class="rank-no">${rank++}</div>
                    <div class="name">${u.username || 'User'}</div>
                    <div class="coins">🟡 ${u.balance || 0}</div>
                </div>`;
            });
            document.getElementById('rankList').innerHTML = listHtml;
        });
    </script>
</body>
</html>
