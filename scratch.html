<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch & Win - Inbox Dollar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; --card-bg: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; padding: 20px; text-align: center; }
        
        .scratch-card { 
            width: 300px; height: 150px; background: #333; margin: 40px auto; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; 
            font-size: 24px; font-weight: bold; border: 2px dashed var(--primary); 
            cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; 
        }
        .scratch-card.disabled { cursor: not-allowed; opacity: 0.6; border-color: #444; }

        .reward-msg { color: var(--primary); margin-top: 20px; font-weight: 600; min-height: 24px; }
        .timer-text { font-size: 18px; color: var(--primary); margin-bottom: 10px; font-weight: 600; }
        .btn-home { background: transparent; border: 1px solid #444; padding: 10px 25px; border-radius: 10px; color: #888; cursor: pointer; margin-top: 20px; text-decoration: none; display: inline-block; font-size: 14px; }
        
        /* Full Screen Ad Overlay (Same as Video Ad) */
        #adOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }
        #adFrame { width: 100%; height: 100%; border: none; }
        #adTimer {
            position: absolute; top: 20px; right: 20px; background: var(--primary);
            color: #000; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 18px;
            z-index: 10000; box-shadow: 0 0 15px rgba(255,123,0,0.5);
        }
    </style>
</head>
<body>

    <div id="adOverlay">
        <div id="adTimer">10s</div>
        <iframe id="adFrame" src=""></iframe>
    </div>

    <h3 style="margin-top: 30px;">Scratch and Win</h3>
    
    <div id="timerDisplay" class="timer-text">Click to Scratch</div>

    <div class="scratch-card" id="card" onclick="startScratch()">SCRATCH HERE</div>
    
    <div id="rewardMsg" class="reward-msg"></div>

    <br>
    <a href="dashboard.html" class="btn-home">← Back to Home</a>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", 
            authDomain: "micro-job-center.firebaseapp.com", 
            databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", 
            projectId: "micro-job-center", 
            storageBucket: "micro-job-center.firebasestorage.app", 
            messagingSenderId: "146985711984", 
            appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const smartLink = "https://www.profitablecpmratenetwork.com/uu5c1ia75?key=74b276b8394ac571c3400dbe1c55b86e";

        auth.onAuthStateChanged((user) => {
            if (!user) window.location.href = "index.html";
        });

        function startScratch() {
            const user = auth.currentUser;
            if (!user) return;

            const overlay = document.getElementById('adOverlay');
            const frame = document.getElementById('adFrame');
            const timerEl = document.getElementById('adTimer');
            const card = document.getElementById('card');

            // ১. অ্যাড লোড করা এবং ওভারলে দেখানো
            frame.src = smartLink;
            overlay.style.display = "block";
            card.onclick = null; // ক্লিক বন্ধ করা
            card.classList.add('disabled');

            let timeLeft = 10;
            timerEl.innerText = timeLeft + "s";

            // ২. ১০ সেকেন্ড টাইমার শুরু
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft + "s";

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    
                    // ৩. রিওয়ার্ড দেওয়া
                    db.ref('users/' + user.uid + '/balance').transaction(c => (c || 0) + 15)
                    .then(() => {
                        overlay.style.display = "none";
                        frame.src = "";
                        document.getElementById('rewardMsg').innerText = "অভিনন্দন! আপনি ১৫ কয়েন পেয়েছেন। ✅";
                        document.getElementById('card').innerText = "💰 15";
                        startCooldown(); // ৫ সেকেন্ড বিরতি
                    });
                }
            }, 1000);
        }

        function startCooldown() {
            let waitTime = 5;
            const timerDisplay = document.getElementById('timerDisplay');
            const card = document.getElementById('card');

            const waitInterval = setInterval(() => {
                waitTime--;
                timerDisplay.innerText = "পরবর্তী কার্ড: " + waitTime + "s";
                
                if (waitTime <= 0) {
                    clearInterval(waitInterval);
                    resetCard();
                }
            }, 1000);
        }

        function resetCard() {
            const card = document.getElementById('card');
            const timerDisplay = document.getElementById('timerDisplay');
            const rewardMsg = document.getElementById('rewardMsg');

            card.classList.remove('disabled');
            card.innerText = "SCRATCH HERE";
            card.onclick = startScratch;
            
            timerDisplay.innerText = "Click to Scratch";
            rewardMsg.innerText = "";
        }
    </script>
</body>
</html>
