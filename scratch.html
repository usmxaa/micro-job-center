<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch & Win - Inbox Dollar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        /* ঘষার এরিয়া */
        .scratch-container {
            position: relative; width: 300px; height: 150px; margin: 40px auto;
            border-radius: 15px; overflow: hidden; border: 2px dashed #444;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); background: #1a1a1a;
        }

        /* নিচের রিওয়ার্ড লেয়ার */
        .reward-behind {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: bold; color: var(--primary); z-index: 1;
        }

        /* ওপরের ঘষার লেয়ার (Canvas) */
        #scratchCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            cursor: crosshair; z-index: 2; touch-action: none;
        }

        .timer-text { font-size: 18px; color: var(--primary); margin-bottom: 10px; font-weight: 600; min-height: 27px; }
        .reward-msg { color: #00E676; margin-top: 20px; font-weight: 600; font-size: 14px; min-height: 21px; }
        
        /* অ্যাড ওভারলে */
        #adOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }
        #adFrame { width: 100%; height: 100%; border: none; }
        #adTimer {
            position: absolute; top: 20px; right: 20px; background: var(--primary);
            color: #000; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 18px;
            z-index: 10000;
        }
        .btn-home { background: transparent; border: 1px solid #444; padding: 10px 25px; border-radius: 10px; color: #888; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="adOverlay">
        <div id="adTimer">10s</div>
        <iframe id="adFrame" src=""></iframe>
    </div>

    <h3 style="margin-top: 30px;">Scratch and Win</h3>
    <div id="statusDisplay" class="timer-text">কার্ডটি ঘষুন (Scratch)</div>

    <div class="scratch-container">
        <div class="reward-behind"><span id="rewardValue">🎁</span></div>
        <canvas id="scratchCanvas" width="300" height="150"></canvas>
    </div>
    
    <div id="rewardMsg" class="reward-msg"></div>
    <br>
    <a href="dashboard.html" class="btn-home">← Back to Home</a>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", 
            authDomain: "micro-job-center.firebaseapp.com", 
            databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", 
            projectId: "micro-job-center", 
            storageBucket: "micro-job-center.firebasestorage.app", 
            messagingSenderId: "146985711984", 
            appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, isScratched = false;
        const smartLink = "https://www.profitablecpmratenetwork.com/uu5c1ia75?key=74b276b8394ac571c3400dbe1c55b86e";

        // ক্যানভাসে ধুসর রঙের লেয়ার তৈরি (ঘষার জন্য)
        function initCanvas() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#888'; // ধুসর রঙ
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#eee';
            ctx.font = '20px Poppins';
            ctx.textAlign = 'center';
            ctx.fillText('SCRATCH HERE', canvas.width/2, canvas.height/2 + 7);
            isScratched = false;
        }

        auth.onAuthStateChanged(user => { 
            if(!user) window.location.href="index.html"; 
            else initCanvas(); 
        });

        // ঘষার ফাংশন
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function scratchMove(e) {
            if(!isDrawing || isScratched) return;
            e.preventDefault();
            const pos = getPos(e);
            
            ctx.globalCompositeOperation = 'destination-out'; // এই লাইনটি ঘষার কাজ করে
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 18, 0, Math.PI * 2);
            ctx.fill();
            checkPercent();
        }

        // কতটুকু ঘষা হয়েছে তা চেক করা
        function checkPercent() {
            const pixels = ctx.getImageData(0,0,canvas.width,canvas.height).data;
            let count = 0;
            for(let i=3; i<pixels.length; i+=4) if(pixels[i]===0) count++;
            
            // ৫০% এর বেশি ঘষলে অ্যাড লোড হবে
            if(count > (pixels.length/4)*0.5 && !isScratched) {
                isScratched = true;
                ctx.clearRect(0,0,canvas.width,canvas.height); // পুরো কার্ড ক্লিয়ার
                startAd();
            }
        }

        // ইভেন্ট লিসেনার
        canvas.addEventListener('mousedown', () => isDrawing=true);
        canvas.addEventListener('touchstart', () => isDrawing=true);
        window.addEventListener('mouseup', () => isDrawing=false);
        window.addEventListener('touchend', () => isDrawing=false);
        canvas.addEventListener('mousemove', scratchMove);
        canvas.addEventListener('touchmove', scratchMove);

        // ভিডিও অ্যাড এবং রিওয়ার্ড ফাংশন
        function startAd() {
            const overlay = document.getElementById('adOverlay');
            const frame = document.getElementById('adFrame');
            const timerEl = document.getElementById('adTimer');
            
            frame.src = smartLink;
            overlay.style.display = "block";
            let timeLeft = 10;
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft + "s";
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    db.ref('users/'+auth.currentUser.uid+'/balance').transaction(c => (c||0)+15).then(() => {
                        overlay.style.display = "none";
                        frame.src = "";
                        document.getElementById('rewardValue').innerText = "💰 15";
                        document.getElementById('rewardMsg').innerText = "অভিনন্দন! ১৫ কয়েন পেয়েছেন। ✅";
                        startCooldown();
                    });
                }
            }, 1000);
        }

        // ৫ সেকেন্ড বিরতি (Cooldown)
        function startCooldown() {
            let wait = 5;
            const status = document.getElementById('statusDisplay');
            const timer = setInterval(() => {
                wait--;
                status.innerText = "পরবর্তী কার্ড: " + wait + "s";
                if(wait <= 0) {
                    clearInterval(timer);
                    status.innerText = "কার্ডটি ঘষুন (Scratch)";
                    document.getElementById('rewardMsg').innerText = "";
                    document.getElementById('rewardValue').innerText = "🎁";
                    initCanvas(); // কার্ড আবার রিসেট
                }
            }, 1000);
        }
    </script>
</body>
</html>
