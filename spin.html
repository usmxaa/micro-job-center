<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Spin - Inbox Dollar</title>
    <style>
        :root { --primary: #FF7B00; }
        body { font-family: 'Poppins', sans-serif; background: #0A0A0A; color: white; text-align: center; padding: 20px; }
        .wheel { width: 250px; height: 250px; border: 8px solid var(--primary); border-radius: 50%; margin: 50px auto; display: flex; align-items: center; justify-content: center; transition: 3s cubic-bezier(0.1, 0, 0.1, 1); background: radial-gradient(#222, #000); font-weight: bold; font-size: 20px; }
        .spin-btn { background: var(--primary); color: #000; border: none; padding: 15px 50px; border-radius: 50px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Lucky Spin Wheel</h3>
    <div class="wheel" id="wheel">SPIN ME</div>
    <br>
    <button class="spin-btn" id="spinBtn" onclick="startSpin()">SPIN NOW</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", authDomain: "micro-job-center.firebaseapp.com", databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", projectId: "micro-job-center", storageBucket: "micro-job-center.firebasestorage.app", messagingSenderId: "146985711984", appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function startSpin() {
            const user = auth.currentUser;
            if(!user) return alert("Login first!");

            const wheel = document.getElementById('wheel');
            const randDeg = Math.floor(Math.random() * 360) + 1800; // ৫ বার ঘুরবে
            wheel.style.transform = `rotate(${randDeg}deg)`;
            
            document.getElementById('spinBtn').disabled = true;

            setTimeout(() => {
                const winAmt = 20; // আপনি চাইলে র‍্যান্ডম করতে পারেন
                db.ref('users/' + user.uid + '/balance').transaction((current) => {
                    return (current || 0) + winAmt;
                }).then(() => {
                    alert("Congratulations! You won " + winAmt + " Coins.");
                    location.reload();
                });
            }, 3500);
        }
    </script>
</body>
</html>
