<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Tasks - Inbox Dollar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF7B00; --dark-bg: #0A0A0A;
            --card-bg: rgba(255, 255, 255, 0.05); --text-main: #FFFFFF;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-bg); color: var(--text-main); margin: 0; padding: 20px; padding-bottom: 100px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 24px; cursor: pointer; }
        .balance-status { background: var(--card-bg); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; }
        .task-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .reward-tag { color: var(--primary); font-weight: 700; font-size: 14px; }
        .play-btn { background: var(--primary); border: none; padding: 8px 15px; border-radius: 10px; color: #000; font-weight: 700; cursor: pointer; }

        /* Full Screen Ad Overlay */
        #adOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }
        #adFrame { width: 100%; height: 100%; border: none; }
        #adTimer {
            position: absolute; top: 20px; right: 20px; background: rgba(255, 123, 0, 0.9);
            color: #000; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 18px;
            box-shadow: 0 0 15px rgba(255,123,0,0.5); z-index: 10000;
        }

        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { text-align: center; color: #666; text-decoration: none; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="adOverlay">
        <div id="adTimer">10s</div>
        <iframe id="adFrame" src=""></iframe>
    </div>

    <div class="header">
        <a onclick="location.href='dashboard.html'" class="back-btn">←</a>
        <h3>All Tasks</h3>
    </div>

    <div class="balance-status">
        <h2 id="coinBalance" style="margin: 5px 0; color: var(--primary);">🟡 0 Coins</h2>
    </div>

    <div class="task-card">
        <div class="task-info">
            <h4>Daily Check-in</h4>
            <span class="reward-tag">+50 Coins</span>
        </div>
        <button class="play-btn" onclick="claimDaily()">CLAIM</button>
    </div>

    <div class="task-card">
        <div class="task-info">
            <h4>Watch Video Ad</h4>
            <span class="reward-tag">+30 Coins</span>
        </div>
        <button class="play-btn" onclick="startVideoAd()">WATCH</button>
    </div>

    <div class="bottom-nav">
        <a onclick="location.href='dashboard.html'" class="nav-item"><span>🏠</span>Home</a>
        <a onclick="location.href='tasks.html'" class="nav-item active"><span>📋</span>Tasks</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg",
            authDomain: "micro-job-center.firebaseapp.com",
            databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com",
            projectId: "micro-job-center",
            storageBucket: "micro-job-center.firebasestorage.app",
            messagingSenderId: "146985711984",
            appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUid = null;

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUid = user.uid;
                db.ref('users/' + user.uid + '/balance').on('value', (snapshot) => {
                    document.getElementById('coinBalance').innerText = `🟡 ${snapshot.val() || 0} Coins`;
                });
            } else { window.location.href = "index.html"; }
        });

        // ভিডিও অ্যাড ফাংশন
        function startVideoAd() {
            if (!currentUid) return;

            const adUrl = "https://www.profitablecpmratenetwork.com/uu5c1ia75?key=74b276b8394ac571c3400dbe1c55b86e";
            const overlay = document.getElementById('adOverlay');
            const frame = document.getElementById('adFrame');
            const timerEl = document.getElementById('adTimer');

            // ১. অ্যাড লোড করা এবং ওভারলে দেখানো
            frame.src = adUrl;
            overlay.style.display = "block";

            let timeLeft = 10;
            timerEl.innerText = timeLeft + "s";

            // ২. টাইমার শুরু
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft + "s";

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    
                    // ৩. রিওয়ার্ড দেওয়া
                    db.ref('users/' + currentUid + '/balance').transaction((current) => {
                        return (current || 0) + 30;
                    }).then(() => {
                        // ৪. অ্যাড বন্ধ করা এবং পেজ রিসেট (Task.html এ ফিরে আসা)
                        overlay.style.display = "none";
                        frame.src = "";
                        alert("Reward Added! 30 Coins 🎉");
                    });
                }
            }, 1000);
        }

        function claimDaily() {
            if (!currentUid) return;
            db.ref('users/' + currentUid + '/balance').transaction(c => (c || 0) + 50)
            .then(() => alert("50 Coins Claimed!"));
        }
    </script>
</body>
</html>
