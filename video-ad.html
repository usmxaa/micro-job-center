<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch & Earn - Inbox Dollar</title>
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; text-align: center; padding: 20px; }
        .video-box { width: 100%; max-width: 350px; height: 200px; background: #1a1a1a; margin: 40px auto; border-radius: 20px; display: flex; align-items: center; justify-content: center; flex-direction: column; border: 1px solid #333; }
        .timer { font-size: 24px; color: var(--primary); font-weight: bold; margin-top: 10px; }
        .btn { background: var(--primary); border: none; padding: 15px 40px; border-radius: 12px; color: #000; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .btn:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>
    <h3>Watch Video Ads</h3>
    <div class="video-box">
        <div style="font-size: 50px;">📺</div>
        <div id="status">Wait 30 seconds to earn</div>
        <div class="timer" id="timer">30s</div>
    </div>
    <button class="btn" id="startBtn" onclick="startAd()">START WATCHING</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", authDomain: "micro-job-center.firebaseapp.com", databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", projectId: "micro-job-center", storageBucket: "micro-job-center.firebasestorage.app", messagingSenderId: "146985711984", appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function startAd() {
            let timeLeft = 30;
            const btn = document.getElementById('startBtn');
            const timerDisplay = document.getElementById('timer');
            btn.disabled = true;

            const countdown = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft + "s";
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    addReward();
                }
            }, 1000);
        }

        function addReward() {
            const user = auth.currentUser;
            db.ref('users/' + user.uid + '/balance').transaction(c => (c || 0) + 30).then(() => {
                alert("Success! You earned 30 Coins.");
                location.reload();
            });
        }
    </script>
</body>
</html>
