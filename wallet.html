<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet - Inbox Dollar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF7B00; --dark-bg: #0A0A0A; --card: #1A1A1A; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; margin: 0; padding: 20px; }
        
        .balance-card { 
            background: linear-gradient(135deg, var(--primary), #FF5500); 
            padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(255,123,0,0.2);
        }
        .balance-card h2 { margin: 0; font-size: 14px; opacity: 0.9; }
        .balance-card p { margin: 10px 0 0; font-size: 32px; font-weight: 800; }

        .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .method-item { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            text-align: center; border: 2px solid transparent; cursor: pointer; transition: 0.3s;
        }
        .method-item.active { border-color: var(--primary); background: rgba(255,123,0,0.05); }
        .method-icon { font-size: 24px; margin-bottom: 10px; display: block; }
        .method-name { font-size: 13px; font-weight: 600; }

        .input-box { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 10px; }
        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; 
            background: #111; color: white; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--primary); }

        .withdraw-btn { 
            background: var(--primary); color: black; border: none; width: 100%; 
            padding: 15px; border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 16px;
        }
        .back-btn { text-align: center; display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="balance-card">
        <h2>Available Balance</h2>
        <p id="userBalance">0 🟡</p>
    </div>

    <h3>Select Method</h3>
    <div class="method-grid">
        <div class="method-item" onclick="selectMethod('Binance', this)">
            <span class="method-icon">🔶</span>
            <span class="method-name">Binance</span>
        </div>
        <div class="method-item" onclick="selectMethod('USDT', this)">
            <span class="method-icon">💲</span>
            <span class="method-name">USDT (TRC20)</span>
        </div>
        <div class="method-item" onclick="selectMethod('Bitcoin', this)">
            <span class="method-icon">₿</span>
            <span class="method-name">Bitcoin</span>
        </div>
        <div class="method-item" onclick="selectMethod('Bkash', this)">
            <span class="method-icon">📱</span>
            <span class="method-name">Bkash</span>
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="accountNo" placeholder="Account Number / Wallet Address">
        <input type="number" id="amount" placeholder="Enter Amount (Coins)">
        <button class="withdraw-btn" onclick="submitWithdraw()">WITHDRAW NOW</button>
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCqI9Te8ffBptsDS-oAIwPjpa5YSSpygYg", 
            authDomain: "micro-job-center.firebaseapp.com", 
            databaseURL: "https://micro-job-center-default-rtdb.firebaseio.com", 
            projectId: "micro-job-center", 
            storageBucket: "micro-job-center.firebasestorage.app", 
            messagingSenderId: "146985711984", 
            appId: "1:146985711984:web:fcb79dd1e82f0f4972b7b5" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let selectedMethod = "";
        let currentBalance = 0;
        let userName = "";

        // ইউজার ডাটা লোড করা
        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', (snapshot) => {
                    const data = snapshot.val();
                    currentBalance = data.balance || 0;
                    userName = data.username || "User";
                    document.getElementById('userBalance').innerText = currentBalance + " 🟡";
                });
            } else {
                window.location.href = "login.html";
            }
        });

        function selectMethod(method, element) {
            selectedMethod = method;
            const items = document.querySelectorAll('.method-item');
            items.forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }

        function submitWithdraw() {
            const account = document.getElementById('accountNo').value;
            const amount = parseInt(document.getElementById('amount').value);
            const user = auth.currentUser;

            if (!selectedMethod) return alert("Please select a method!");
            if (!account || !amount) return alert("Fill all details!");
            if (amount < 1000) return alert("Minimum withdraw is 1000 coins!");
            if (amount > currentBalance) return alert("Insufficient balance!");

            // ডাটাবেসে রিকোয়েস্ট পাঠানো
            const requestData = {
                uid: user.uid,
                name: userName,
                method: selectedMethod,
                account: account,
                amount: amount,
                status: "Pending",
                timestamp: Date.now()
            };

            // ১. রিকোয়েস্ট সেভ করা
            db.ref('withdrawRequests').push(requestData).then(() => {
                // ২. ইউজারের ব্যালেন্স কেটে নেওয়া
                db.ref('users/' + user.uid + '/balance').set(currentBalance - amount);
                alert("Withdrawal Request Sent Successfully! ✅");
                location.reload();
            }).catch(err => alert("Error: " + err.message));
        }
    </script>
</body>
</html>
